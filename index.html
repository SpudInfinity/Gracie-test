<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive of Longing | Gracie Abrams</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400;1,600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #070809; --text: #b0b0b0; --accent: #8ba1b8; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; display: flex; 
            justify-content: center; align-items: flex-start; 
            min-height: 100vh; overflow-y: auto; padding: 40px 0;
        }
        #app { width: 90%; max-width: 440px; padding: 20px; text-align: center; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        .photo-frame { width: 125px; height: 125px; margin: 0 auto 30px; border-radius: 50%; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); box-shadow: 0 10px 35px rgba(0,0,0,0.6); }
        .gracie-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.1); }
        .btn { 
            display: block; width: 100%; padding: 22px; margin: 12px 0; 
            background: none; border: 1px solid rgba(255,255,255,0.08); 
            cursor: pointer; color: var(--text); font-size: 0.7rem; 
            text-align: left; padding-left: 20px; letter-spacing: 2.5px; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-transform: uppercase; outline: none;
        }
        .btn:hover { background: #fff; color: #000; padding-left: 35px; }
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 50px; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.6s ease; }
        #quiz, #result { display: none; }
        #q-text { font-size: 1.5rem; min-height: 100px; line-height: 1.4; margin-bottom: 40px; color: #f0f0f0; letter-spacing: -0.5px; }
        .quote-box { margin: 35px 0; padding: 30px 25px; border-top: 0.5px solid rgba(255,255,255,0.1); border-bottom: 0.5px solid rgba(255,255,255,0.1); text-align: left; line-height: 2; font-size: 0.85rem; color: #d0d0d0; }
        .tag { padding: 5px 12px; border: 0.5px solid rgba(255,255,255,0.15); font-size: 0.55rem; color: var(--accent); margin: 4px; display: inline-block; letter-spacing: 1px; }
        .match-item { text-align: left; margin: 25px 0; }
        .match-info { display: flex; justify-content: space-between; font-size: 0.55rem; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .track-bg { height: 1px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .track-fill { height: 100%; background: var(--accent); width: 0; transition: width 2.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .label { font-size: 0.5rem; letter-spacing: 6px; opacity: 0.3; margin-bottom: 15px; text-transform: uppercase; display: block; }
    </style>
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="block-me-out.mp3" type="audio/mpeg">
    </audio>

    <div id="app">
        <div id="start">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img" alt="Gracie Abrams"></div>
            <h1 class="serif" style="font-size: 2.6rem; margin-bottom: 8px; color: #fff; letter-spacing: -1px;">碎裂的回响</h1>
            <p class="label">The Archive of Longing</p>
            <p style="font-size: 0.65rem; opacity: 0.5; line-height: 2.2; margin: 45px 0; letter-spacing: 1.2px;">
                “我甚至不需要你记得我。<br>我只需要这一刻，你是诚实的。”
            </p>
            <button class="btn" style="text-align:center; padding-left:0;" onclick="begin()">开启记忆存档 / ENTER</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p class="label" id="q-counter">Chapter 01</p>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img" alt="Gracie Abrams"></div>
            <p class="label">Profile Resonance</p>
            <h1 id="res-title" class="serif" style="font-size: 2.2rem; margin: 10px 0; color: #fff; letter-spacing: -1px;"></h1>
            <div id="res-tags"></div>
            <div class="quote-box serif" id="res-quote"></div>
            <p id="res-desc" class="serif" style="opacity: 0.6; line-height: 2.3; text-align: left; font-size: 0.9rem; padding: 0 5px;"></p>
            
            <div style="margin-top: 60px; text-align: left;">
                <p class="label">Soul Tracks Correlation (Top 5)</p>
                <div id="match-list"></div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top: 70px; width: auto; padding: 12px 45px; display: inline-block; text-align:center; font-size:0.6rem;">重新整理碎片 / REBOOT</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');

        // 100个扩展关键词库
        const allKeywords = [
            "末日余晖", "过期雨季", "蓝莓之夜", "潮湿阁楼", "失语霓虹", "碎裂胶片", "凌晨四点", "深海呼吸", "枯萎信笺", "电子荒原", 
            "无声告别", "坠落行星", "铁锈记忆", "薄雾晨曦", "孤岛心理", "旧磁带跳帧", "空镜美学", "私人废墟", "潜意识漫游", "半梦半醒", 
            "极简忧郁", "反刍遗憾", "黑白默片", "灵魂褶皱", "错位时空", "循环自毁", "致命温柔", "孤独观测者", "冷色调依恋", "瞬时永恒", 
            "逃离地心", "玫瑰余烬", "无人区玫瑰", "昨日世界", "灰烬审美", "深渊的回响", "重庆森林", "恋恋风尘", "北野武蓝", "盐系寂寞", 
            "半衰期", "情感放射", "潮湿主义", "旧电影质感", "无解的题", "真空地带", "听觉残留", "心碎出口", "蓝色调式", "被动荒废", 
            "影子练习", "过敏体质", "降噪生活", "平行失语", "昨日重现", "时间缝隙", "白噪音", "梦境碎片", "触觉失灵", "深蓝梦呓", 
            "午夜飞行", "无目的流浪", "废弃电台", "降落练习", "隐形裂痕", "情绪过载", "冷色调告别", "匿名信件", "远方共振", "旧磁带", 
            "复古伤感", "半透明", "琥珀色记忆", "荒野呼唤", "私密频率", "低空飞行", "极简孤寂", "雾中漫行", "光影废墟", "末班车", 
            "空房间", "无声尖叫", "灵魂寄宿", "幻肢痛", "单色世界", "雨水收集", "微凉体温", "心室颤动", "旧报纸", "黑白默片", 
            "倒放的人生", "破碎共识", "冷战美学", "灰度空间", "呼吸刻度", "情感幽灵", "数字葬礼", "霓虹废土", "寂静之声", "无名氏"
        ];

        // Gracie Abrams 完整曲库
        const gracieSongs = [
            "21", "I miss you, I'm sorry", "Long Sleeves", "minor", "Friend", "Stay", "Unlearn", "Block me out", 
            "Full Machine", "Hard to sleep", "Faultline", "Mess It Up", "Camden", "The Exit", "Right Now", 
            "Amelie", "Where do we go now?", "Best", "Normal Thing", "Risk", "Close To You", 
            "Blowing Smoke", "Let It Happen", "Tough Love", "I Love You, I'm Sorry", "Free Now", 
            "Gave You I Gave You", "Feels Like", "Rockland", "Blue", "Augusta", "Cedar", "Brush Fire", "That’s So True"
        ];

        const types = {
            'A': { title: "I miss you, I'm sorry", quote: "“有些事，只有通过遗憾才能被完整地记起。”", desc: "你习惯于在废墟中翻找尚未冷却的温存。那句‘对不起’不是为了求得原谅，而是为了给那段无法安放的过去举行一场只有一人出席的葬礼。你在这首歌里听到的，是你自己从未寄出的信。" },
            'B': { title: "Block Me Out", quote: "“我太擅长在自己的脑海里制造噪音，直到听不见心跳声。”", desc: "你是一座在深夜独自运行的精密机器，所有的过载都被掩盖在平静的呼吸下。你渴望彻底的‘屏蔽’，因为你明白，真正的自由往往始于彻底的断裂。你的灵魂在等待一次静音。" },
            'C': { title: "Risk", quote: "“哪怕只有一瞬间的火花，也足以照亮整段荒芜。”", desc: "你拥有一种近乎悲剧性的勇敢。明知前方是悬崖，你依然迷恋那种坠落前的眩晕感。你不需要理智的避风港，你只需要在这段旋律里，把那些名为‘渴望’的余烬再次吹燃。" },
            'D': { title: "Free Now", quote: "“我也许没能到达目的地，但我确实离开了原点。”", desc: "你终于穿过了那条漫长且潮湿的隧道。那些曾经让你彻夜难眠的细节，现在已经变成了风中的尘埃。这是一种历经风暴后的轻盈，你已经不再需要向昨日道歉。" }
        };

        const questions = [
            { q: "深夜里，你是如何听见自己的？", options: [{t:"在旧录音带的杂音里", s:"A"}, {t:"在混乱的心跳频率中", s:"B"}, {t:"在另一个人的呼吸声旁", s:"C"}, {t:"在凌晨四点的寂静里", s:"D"}] },
            { q: "如果你是房间里亮着的那盏灯？", options: [{t:"闪烁着快要熄灭", s:"A"}, {t:"照亮了不该看的角落", s:"B"}, {t:"为了某人一直亮着", s:"C"}, {t:"我已经学会了自己关灯", s:"D"}] },
            { q: "道歉的碎片堆在地上，那是？", options: [{t:"必须拼凑好的过去", s:"A"}, {t:"扎脚的玻璃，别碰", s:"B"}, {t:"一种渴望被爱的筹码", s:"C"}, {t:"可以打扫掉的尘埃", s:"D"}] },
            { q: "当你凝视镜中的自己？", options: [{t:"一个十年前的遗憾", s:"A"}, {t:"一个满负荷运转的机器", s:"B"}, {t:"一个等待点燃的火苗", s:"C"}, {t:"一个找回名字的陌生人", s:"D"}] },
            { q: "要给心碎命名的话？", options: [{t:"昨日的延长线", s:"A"}, {t:"正在崩塌的围墙", s:"B"}, {t:"心甘情愿的冒险", s:"C"}, {t:"落幕后的余晖", s:"D"}] },
            { q: "更习惯躲在哪里？", options: [{t:"潮湿的阁楼", s:"A"}, {t:"巨大的耳机里", s:"B"}, {t:"对方大衣的阴影里", s:"C"}, {t:"空旷的公路尽头", s:"D"}] },
            { q: "如果你是一个季节？", options: [{t:"永恒的深秋", s:"A"}, {t:"暴雨前的闷热", s:"B"}, {t:"盛夏最刺眼的阳光", s:"C"}, {t:"初春刚融化的冰", s:"D"}] },
            { q: "回忆像哪种声音？", options: [{t:"反向播放的磁带", s:"A"}, {t:"指甲划过黑板", s:"B"}, {t:"远处传来的低音", s:"C"}, {t:"翻动旧纸张的沙沙声", s:"D"}] },
            { q: "如何处理沉重的情绪？", options: [{t:"写成没收件人的信", s:"A"}, {t:"按下静音键假装听不见", s:"B"}, {t:"全部倾倒给某人", s:"C"}, {t:"让它们随长路流走", s:"D"}] },
            { q: "必须要烧掉一样东西？", options: [{t:"唯一的旧照片", s:"A"}, {t:"昨晚发疯写的日记", s:"B"}, {t:"那个人的联系方式", s:"C"}, {t:"不再合适的旧衣服", s:"D"}] },
            { q: "“爱”最直观的触感？", options: [{t:"冰冷的金属拉链", s:"A"}, {t:"生锈的齿轮", s:"B"}, {t:"眩晕的心跳", s:"C"}, {t:"微风拂过皮肤", s:"D"}] },
            { q: "当人群散去，你？", options: [{t:"寻找掉落的碎片", s:"A"}, {t:"数着呼吸缓解心悸", s:"B"}, {t:"期待那个人回头", s:"C"}, {t:"转身走向反方向", s:"D"}] },
            { q: "如果你是一个秘密？", options: [{t:"写在泛黄的纸上", s:"A"}, {t:"藏在保险柜里", s:"B"}, {t:"在深夜呼之欲出", s:"C"}, {t:"已经不再是秘密", s:"D"}] },
            { q: "关于那个TA，现在的联想？", options: [{t:"没有锁的钥匙", s:"A"}, {t:"无法停止的循环", s:"B"}, {t:"坠落的恒星", s:"C"}, {t:"一张模糊的背景板", s:"D"}] },
            { q: "必须要说最后一句话？", options: [{t:"“对不起，我还在这”", s:"A"}, {t:"“把我彻底屏蔽吧”", s:"B"}, {t:"“我愿意再冒一次险”", s:"C"}, {t:"“我已经自由了”", s:"D"}] }
        ];

        let cur = 0; let scores = { A:0, B:0, C:0, D:0 };

        function begin() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            // 尝试触发音乐
            audio.play().catch(() => {
                console.log("Audio waiting for user interaction...");
            });
            show();
        }

        function show() {
            if(cur >= questions.length) { finish(); return; }
            const q = questions[cur];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-counter').innerText = `CHAPTER ${String(cur+1).padStart(2, '0')}`;
            document.getElementById('bar').style.width = ((cur+1)/questions.length)*100 + '%';
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; 
                b.onclick = () => { 
                    // 答题中途再次尝试激活音乐
                    if(audio.paused) audio.play().catch(()=>{});
                    scores[o.s]++; 
                    cur++; 
                    show(); 
                };
                optDiv.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const win = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const data = types[win];

            document.getElementById('res-title').innerText = data.title;
            document.getElementById('res-quote').innerText = data.quote;
            document.getElementById('res-desc').innerText = data.desc;
            
            // 抽取 6 个随机关键词
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            allKeywords.sort(() => 0.5 - Math.random()).slice(0, 6).forEach(t => {
                tagDiv.innerHTML += `<span class="tag">${t}</span>`;
            });

            // 契合度：推荐 5 首 Gracie 的曲目
            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            const candidates = gracieSongs.filter(s => s !== data.title).sort(() => 0.5 - Math.random()).slice(0, 5);
            
            candidates.forEach((s, idx) => {
                let val = 97 - (idx * 4) - Math.floor(Math.random() * 5);
                matchList.innerHTML += `
                    <div class="match-item">
                        <div class="match-info"><span>${s}</span><span>${val}% Resonance</span></div>
                        <div class="track-bg"><div class="track-fill" style="width:${val}%"></div></div>
                    </div>`;
            });

            document.getElementById('result').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
