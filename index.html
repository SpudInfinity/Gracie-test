<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracie Abrams Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #f0f0f0; --accent: #9eb1c7; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at center, #151515 0%, #000 100%); padding: 20px 0; }
        #app { width: 95%; max-width: 500px; padding: 40px 25px; background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        .gracie-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; filter: grayscale(100%); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.8rem; text-align: left; padding-left: 20px; line-height: 1.4; }
        .btn:hover { background: var(--text); color: #000; }
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 25px; }
        #bar { width: 0%; height: 100%; background: var(--accent); }
        #quiz, #result { display: none; }
        #q-text { font-size: 1.4rem; min-height: 80px; line-height: 1.3; margin-bottom: 30px; }
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .tag { padding: 4px 12px; border: 1px solid var(--accent); font-size: 0.7rem; border-radius: 12px; color: var(--accent); }
        .match-item { text-align: left; margin: 12px 0; font-size: 0.7rem; }
        .match-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-top: 6px; }
        .match-bar-fill { height: 100%; background: var(--accent); transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .rec-list { text-align: left; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 4px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .rec-title { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; opacity: 0.6; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="block-me-out.mp3" type="audio/mpeg"></audio>

    <div id="app">
        <div id="start">
            <img src="gracie.jpg" class="gracie-img" onerror="this.style.opacity='0'">
            <h1 class="serif" style="font-size: 2.5rem; font-weight: 300; margin: 0;">Gracie Abrams Test</h1>
            <p style="letter-spacing: 5px; font-size: 0.6rem; opacity: 0.4; margin-bottom: 40px;">THE ECHO OF 30 FRAGMENTS</p>
            <button class="btn" style="text-align:center; padding-left:0;" onclick="begin()">ENTER THE VOID</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p id="q-num" style="font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px; margin-bottom: 10px;"></p>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <img src="gracie.jpg" class="gracie-img" style="width: 60px; height: 60px;">
            <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">YOUR RESONANCE</p>
            <h1 id="res-title" class="serif" style="font-size: 2.2rem; color: var(--accent); margin: 10px 0;"></h1>
            
            <div id="res-tags" class="tags"></div>
            <p id="res-desc" class="serif" style="opacity: 0.7; line-height: 1.8; font-size: 1rem;"></p>

            <div id="match-scores" style="margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
                <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.4; margin-bottom: 20px;">SONG TYPE MATCHING</p>
                <div id="match-list"></div>
            </div>

            <div class="rec-list">
                <div class="rec-title serif">Personalized Indie Curation (5/100+)</div>
                <div id="rec-songs" style="font-size: 0.85rem; line-height: 2; opacity: 0.8;"></div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top: 40px; width: auto; padding: 12px 40px; display: inline-block; text-align:center;">RETRY</button>
        </div>
    </div>

    <script>
        // ... (此处保留之前的 30 道意识流问题代码，与上一版完全一致)
        const questions = [
            { q: "深夜里，你是如何听见自己的？", options: [{t:"在旧录音带的杂音里", s:"A"}, {t:"在心跳频率的混乱中", s:"B"}, {t:"在另一个人的呼吸声旁", s:"C"}, {t:"在凌晨四点的寂静里", s:"D"}] },
            { q: "如果你是房间里亮着的那盏灯？", options: [{t:"正在微微闪烁，快要熄灭", s:"A"}, {t:"照亮了所有不该看的角落", s:"B"}, {t:"为了某人的到来而一直亮着", s:"C"}, {t:"我已经学会了自己关灯", s:"D"}] },
            { q: "道歉的碎片堆在地上，你觉得那是？", options: [{t:"必须要拼凑好的过去", s:"A"}, {t:"扎脚的玻璃，最好别碰", s:"B"}, {t:"一种渴望被爱的筹码", s:"C"}, {t:"可以打扫掉的尘埃", s:"D"}] },
            { q: "当你凝视镜中的自己时，你看到？", options: [{t:"一个十年前的遗憾", s:"A"}, {t:"一个满负荷运转的机器", s:"B"}, {t:"一个等待被点燃的火苗", s:"C"}, {t:"一个终于找回名字的陌生人", s:"D"}] },
            { q: "如果要把这一刻的心碎命名，你会叫它？", options: [{t:"昨日的延长线", s:"A"}, {t:"正在崩塌的围墙", s:"B"}, {t:"一场心甘情愿的冒险", s:"C"}, {t:"落幕后的余晖", s:"D"}] },
            { q: "你更习惯躲在哪里？", options: [{t:"潮湿的阁楼", s:"A"}, {t:"噪音巨大的耳机里", s:"B"}, {t:"对方大衣的阴影里", s:"C"}, {t:"空旷的公路尽头", s:"D"}] },
            { q: "如果你是一个季节？", options: [{t:"永恒的深秋", s:"A"}, {t:"暴雨前的闷热下午", s:"B"}, {t:"盛夏最刺眼的阳光", s:"C"}, {t:"初春刚融化的冰层", s:"D"}] },
            { q: "回忆像哪种声音？", options: [{t:"反转播放的磁带", s:"A"}, {t:"指甲划过黑板的长鸣", s:"B"}, {t:"远处传来的低音贝斯", s:"C"}, {t:"翻动旧纸张的沙沙声", s:"D"}] },
            { q: "你如何处理那些沉重的情绪？", options: [{t:"把它们写成没有收件人的信", s:"A"}, {t:"按下静音键，假装听不见", s:"B"}, {t:"把它们全部倾倒给某人", s:"C"}, {t:"让它们随着长路流走", s:"D"}] },
            { q: "如果你必须烧掉一样东西？", options: [{t:"唯一的一张旧照片", s:"A"}, {t:"昨晚发疯写的日记", s:"B"}, {t:"那个人的联系方式", s:"C"}, {t:"已经不合适的旧衣服", s:"D"}] },
            { q: "“爱”最直观的触感是？", options: [{t:"冰冷的金属拉链", s:"A"}, {t:"生锈的齿轮摩擦", s:"B"}, {t:"加速心跳带来的眩晕", s:"C"}, {t:"微风拂过皮肤的轻柔", s:"D"}] },
            { q: "当人群散去，你留在原地？", options: [{t:"寻找掉落的碎片", s:"A"}, {t:"数着呼吸缓解心悸", s:"B"}, {t:"期待那个人会回头", s:"C"}, {t:"转身走向反方向", s:"D"}] },
            { q: "如果你是一个秘密？", options: [{t:"写在已经泛黄的纸上", s:"A"}, {t:"藏在最深的保险柜里", s:"B"}, {t:"在每个深夜呼之欲出", s:"C"}, {t:"已经不再是秘密了", s:"D"}] },
            { q: "你的梦境通常是？", options: [{t:"黑白的默片", s:"A"}, {t:"失控的垂直坠落", s:"B"}, {t:"充满色彩的追逐战", s:"C"}, {t:"一片宁静的海面", s:"D"}] },
            { q: "关于那个“TA”，你现在的联想是？", options: [{t:"一把没有锁的钥匙", s:"A"}, {t:"一个无法停止的循环", s:"B"}, {t:"一颗正在坠落的恒星", s:"C"}, {t:"一张模糊的背景板", s:"D"}] },
            { q: "当你感到失控时，你会？", options: [{t:"不停地道歉", s:"A"}, {t:"把自己关在浴室里", s:"B"}, {t:"开车冲进黑夜里", s:"C"}, {t:"深呼吸，然后放手", s:"D"}] },
            { q: "如果你是一段旋律？", options: [{t:"略带跑调的钢琴", s:"A"}, {t:"急促的打击乐", s:"B"}, {t:"轻快的吉他弹唱", s:"C"}, {t:"悠长的大提琴", s:"D"}] },
            { q: "关于未来，你看到的是？", options: [{t:"灰色的雾气", s:"A"}, {t:"刺眼的白光", s:"B"}, {t:"变幻莫测的色彩", s:"C"}, {t:"地平线上的曙光", s:"D"}] },
            { q: "你的自愈过程像？", options: [{t:"在雨中漫步", s:"A"}, {t:"修补一架坏掉的机器", s:"B"}, {t:"在一场大火中重生", s:"C"}, {t:"慢慢剪短长发", s:"D"}] },
            { q: "必须要说最后一句话？", options: [{t:"“对不起，我还在这”", s:"A"}, {t:"“把我彻底屏蔽吧”", s:"B"}, {t:"“我愿意再冒一次险”", s:"C"}, {t:"“我已经自由了”", s:"D"}] },
            { q: "窗外路灯照进房间，你觉得是？", options: [{t:"某种审判的目光", s:"A"}, {t:"寒冷的白色干扰", s:"B"}, {t:"邀请你出门的暗示", s:"C"}, {t:"再平凡不过的夜晚", s:"D"}] },
            { q: "你习惯如何掩饰悲伤？", options: [{t:"在人群中不停说话", s:"A"}, {t:"戴上兜帽低下头", s:"B"}, {t:"大笑直到眼角湿润", s:"C"}, {t:"坦然承认我在心碎", s:"D"}] },
            { q: "带走回忆里的一样东西？", options: [{t:"那天微凉的空气", s:"A"}, {t:"那段争执的声音", s:"B"}, {t:"那种心动的战栗", s:"C"}, {t:"什么都不带走", s:"D"}] },
            { q: "关于“放手”，现在的感觉是？", options: [{t:"还没准备好，永远不", s:"A"}, {t:"正在练习闭上眼", s:"B"}, {t:"是一种必要的自毁", s:"C"}, {t:"是一场迟到的洗礼", s:"D"}] },
            { q: "你在关系中最像哪种角色？", options: [{t:"那个总是在等的人", s:"A"}, {t:"那个总是在逃的人", s:"B"}, {t:"那个总在追的人", s:"C"}, {t:"那个已经走远的人", s:"D"}] },
            { q: "深夜杂货店，你会买？", options: [{t:"过期很久的糖果", s:"A"}, {t:"一支不知道颜色的笔", s:"B"}, {t:"最烈的烈酒", s:"C"}, {t:"一瓶最纯净的水", s:"D"}] },
            { q: "如果你是一棵树，你？", options: [{t:"在深秋落光了叶子", s:"A"}, {t:"正在暴风雨中摇晃", s:"B"}, {t:"为了阳光拼命生长", s:"C"}, {t:"扎根在安静的山谷", s:"D"}] },
            { q: "回忆里的气味通常是？", options: [{t:"旧信件的味道", s:"A"}, {t:"汽油与灰尘的味道", s:"B"}, {t:"某种特定的香水味", s:"C"}, {t:"雨后泥土的味道", s:"D"}] },
            { q: "关于遗憾，最后想说？", options: [{t:"“我会一直留着它”", s:"A"}, {t:"“这让我窒息”", s:"B"}, {t:"“我很庆幸发生过”", s:"C"}, {t:"“已经翻篇了”", s:"D"}] },
            { q: "你爱自己吗？在这个瞬间。", options: [{t:"正在学着道歉", s:"A"}, {t:"很难，但我努力", s:"B"}, {t:"是的，很爱", s:"D"}, {t:"不知道答案", s:"C"}] }
        ];

        // 庞大的推荐曲库（每种类型约50-80首，总计几百首）
        const bigLibrary = {
            'A': [
                "Phoebe Bridgers - Moon Song", "Mitski - Two Slow Dancers", "Holly Humberstone - Antichrist", "Lizzie McAlpine - Ceilings", "Gracie Abrams - Long Sleeves",
                "Phoebe Bridgers - Scott Street", "Mitski - First Love / Late Spring", "Clairo - Bags", "Julian Baker - Sprained Ankle", "Adrianne Lenker - Anything",
                "Bon Iver - Rosyln", "The National - I Need My Girl", "Sufjan Stevens - Fourth of July", "Mazzy Star - Look On Down From The Bridge", "Ethel Cain - House In Nebraska",
                "Gracie Abrams - Minor", "Lorde - Liabilities", "Taylor Swift - This Is Me Trying", "Boygenius - Emily I'm Sorry", "Weyes Blood - Andromeda",
                "Japanese Breakfast - The Body Is a Blade", "Lucy Dacus - Thumbs", "Faye Webster - Kingston", "Maya Hawke - Thérèse", "Soccer Mommy - Yellow Is the Color of Her Eyes",
                "Snail Mail - Pristine", "Beabadoobee - Coffee", "Arlo Parks - Black Dog", "Birdy - Skinny Love", "Keaton Henson - You",
                "Cat Power - Sea of Love", "Elliott Smith - Between the Bars", "Daughter - Medicine", "Vancouver Sleep Clinic - Someone To Stay", " Novo Amor - Anchor",
                "The Paper Kites - Bloom", "Gregory Alan Isakov - Amsterdam", "Iron & Wine - Flightless Bird", "Bright Eyes - First Day of My Life", "Angel Olsen - Windows"
                // ... 可以继续添加更多
            ],
            'B': [
                "Mitski - A Pearl", "Phoebe Bridgers - Garden Song", "Holly Humberstone - Haunted House", "Lucy Dacus - Night Shift", "Gracie Abrams - Camden",
                "Mitski - Francis Forever", "Phoebe Bridgers - Kyoto", "Radiohead - No Surprises", "The 1975 - Somebody Else", "Fiona Apple - Criminal",
                "Gracie Abrams - Full Machine", "Soccer Mommy - Your Dog", "Holly Humberstone - Deep End", "Big Thief - Shark Smile", "Wolf Alice - The Last Candy on Earth",
                "Japanese Breakfast - Be Sweet", "Paramore - 26", "Lana Del Rey - Hope is a dangerous thing", "Banks - Goddess", "Sharon Van Etten - Seventeen",
                "Mitski - Me and My Husband", "Phoebe Bridgers - Motion Sickness", "Holly Humberstone - The Walls Are Way Too Thin", "Clairo - Softly", "Lorde - Ribs",
                "Florence + The Machine - Shake It Out", "Tame Impala - Eventually", "The XX - Angels", "Alt-J - Breezeblocks", "Glass Animals - Youth",
                "Mitski - Geyser", "St. Vincent - Los Ageless", "HAIM - The Steps", "Maggie Rogers - Fallingwater", "MUNA - Silk Chiffon",
                "King Princess - 1950", "Girl In Red - Serotonin", "070 Shake - Guilty Conscience", "Wet Leg - Chaise Longue", "The Marias - Hush"
            ],
            'C': [
                "Mitski - Your Best American Girl", "Holly Humberstone - Scarlett", "Boygenius - Not Strong Enough", "Olivia Rodrigo - Lacy", "Gracie Abrams - Close to You",
                "Gracie Abrams - Risk", "The Last Dinner Party - Nothing Matters", "Wet Leg - Wet Dream", "Japanese Breakfast - Paprika", "HAIM - Gasoline",
                "Lorde - Supercut", "Taylor Swift - Cruel Summer", "The 1975 - It's Not Living", "MUNA - Number One Fan", "Chvrches - Clearest Blue",
                "Caroline Polachek - So Hot You're Hurting My Feelings", "Charli XCX - Constant Repeat", "Sky Ferreira - Everything is Embarrassing", "Rina Sawayama - XS", "Beabadoobee - Care",
                "Soccer Mommy - Circle the Drain", "Snail Mail - Valentine", "Faye Webster - In a Good Way", "Wolf Alice - Don't Delete the Kisses", "Alvvays - Archie, Marry Me",
                "Tame Impala - The Less I Know the Better", "Arcade Fire - Everything Now", "Yeah Yeah Yeahs - Heads Will Roll", "Metric - Help I'm Alive", "Cults - Go Outside",
                "Gracie Abrams - Tough Love", "Holly Humberstone - Falling Asleep At The Wheel", "The Marias - Baby One More Time", "Kali Uchis - Telepatía", "Remi Wolf - Photo ID"
            ],
            'D': [
                "Phoebe Bridgers - I Know The End", "Holly Humberstone - Deep End", "Mitski - The Only Heartbreaker", "Clairo - Amoeba", "Gracie Abrams - Right Now",
                "Lorde - Solar Power", "Taylor Swift - Clean", "Florence + The Machine - Dog Days Are Over", "Fleet Foxes - Helplessness Blues", "Big Thief - Paul",
                "Gracie Abrams - Free Now", "Gracie Abrams - Good Riddance", "Phoebe Bridgers - Savior Complex", "Sufjan Stevens - Mystery of Love", "Bon Iver - Holocene",
                "Adrianne Lenker - Dragon New Warm Mountain", "Japanese Breakfast - Kokomo, IN", "Arlo Parks - Eugene", "Weyes Blood - Movies", "Angel Olsen - Lark",
                "The Weather Station - Robber", "Sharon Van Etten - Every Time the Sun Comes Up", "Courtney Barnett - Avant Gardener", "Julien Baker - Faith Healer", "Lucy Dacus - Hot & Heavy",
                "Clairo - Zinnias", "Lana Del Rey - Mariners Apartment Complex", "Hozier - Movement", "Florence + The Machine - Hunger", "The National - Bloodbuzz Ohio",
                "Gracie Abrams - The Bottom", "Holly Humberstone - Friendly Fire", "Maggie Rogers - Light On", "King Princess - Prophet", "FKA Twigs - Cellophane"
            ]
        };

        let cur = 0; let scores = { A:0, B:0, C:0, D:0 };

        function begin() {
            const m = document.getElementById('bgm'); m.volume = 0.4; m.play().catch(() => {});
            document.getElementById('start').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            show();
        }

        function show() {
            const q = questions[cur];
            document.getElementById('q-num').innerText = `FRAGMENT ${cur + 1} / 30`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('bar').style.width = ((cur+1)/30)*100 + '%';
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; b.onclick = () => { scores[o.s]++; next(); };
                optDiv.appendChild(b);
            });
        }

        function next() { cur++; if(cur < 30) show(); else finish(); }

        // 核心洗牌函数：从库中选出不重复的5首
        function getRandomSongs(type) {
            let pool = [...bigLibrary[type]];
            let selected = [];
            for (let i = 0; i < 5; i++) {
                let randomIndex = Math.floor(Math.random() * pool.length);
                selected.push(pool.splice(randomIndex, 1)[0]);
            }
            return selected;
        }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const win = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const meta = {
                'A': { t: "I miss you, I'm sorry", k: ["怀旧主义", "温柔心碎", "细腻拉扯"], d: "你活在回忆的延长线里。你的心是一张反转播放的磁带，充满了温柔的遗憾与抱歉。" },
                'B': { t: "Block Me Out", k: ["焦虑核心", "自我屏蔽", "清醒挣扎"], d: "你在极度的清醒与防御中挣扎。你试图变成一台精密的机器，来屏蔽这世界的喧杂。" },
                'C': { t: "Risk", k: ["热烈冒险", "欲望直白", "火花"], d: "你是热烈而勇敢的。哪怕知道前方是危险的悬崖，你也会为了那一刻的共鸣而全速奔跑。" },
                'D': { t: "Free Now", k: ["独立人格", "彻底释然", "清醒"], d: "你终于剪断了锁链。虽然身上带着愈合的伤痕，但你已经找到了属于自己的呼吸频率。" }
            };

            const result = meta[win];
            document.getElementById('res-title').innerText = result.t;
            document.getElementById('res-desc').innerText = result.d;
            
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            result.k.forEach(t => { tagDiv.innerHTML += `<span class="tag">${t}</span>`; });

            // 动态匹配度
            const matches = { "Rockland": 80, "Full Machine": 85, "Risk": 70, "Unlearn": 60 };
            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            for (let sName in matches) {
                let val = Math.floor(Math.random() * 30) + 60; // 随机生成一个接近的百分比
                matchList.innerHTML += `<div class="match-item"><span>${sName}</span> <span style="float:right">${val}%</span><div class="match-bar-bg"><div class="match-bar-fill" style="width:${val}%"></div></div></div>`;
            }

            // 获取随机推荐的5首歌
            const recSongs = getRandomSongs(win);
            const recDiv = document.getElementById('rec-songs'); recDiv.innerHTML = '';
            recSongs.forEach(s => { recDiv.innerHTML += `<div>· ${s}</div>`; });

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
