<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architecture of Resonance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400;1,600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #08090a; --text: #e0e0e0; --accent: #9eb1c7; 
            --gracie-yellow: #fdf5e6; /* 淡淡的黄玫瑰色 */
            --glass: rgba(255, 255, 255, 0.02);
        }
        * { box-sizing: border-box; cursor: url('https://cur.cursors-4u.net/others/oth-8/oth726.cur'), auto; }
        body { 
            margin: 0; background-color: var(--bg); color: var(--text); 
            font-family: 'Montserrat', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            transition: background-color 2s ease; overflow-x: hidden;
        }
        
        /* 增加 Gracie 风格的装饰元素 */
        .bow { position: fixed; width: 30px; opacity: 0.1; filter: invert(1); pointer-events: none; }
        .yellow-rose { position: fixed; width: 40px; opacity: 0.05; pointer-events: none; }

        #app { 
            width: 95%; max-width: 550px; padding: 60px 35px; 
            background: var(--glass); backdrop-filter: blur(50px); 
            border: 1px solid rgba(255,255,255,0.05); text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative;
        }

        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        
        /* 封面美化 */
        .gracie-img { 
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover; 
            filter: grayscale(100%) contrast(1.1); margin-bottom: 30px; 
            border: 0.5px solid rgba(255,255,255,0.2); transition: 1s;
        }
        #start:hover .gracie-img { filter: grayscale(0%); transform: rotate(5deg); }

        .btn { 
            display: block; width: 100%; padding: 22px; margin: 15px 0; 
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.08); 
            cursor: pointer; color: var(--text); font-family: 'Montserrat', sans-serif; 
            font-size: 0.8rem; text-align: left; padding-left: 30px; 
            letter-spacing: 2px; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .btn:hover { background: var(--gracie-yellow); color: #000; padding-left: 40px; }

        .progress-container { width: 100%; height: 1px; background: rgba(255,255,255,0.03); margin-bottom: 50px; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.8s ease; }

        #quiz, #result { display: none; }
        #q-text { font-size: 1.8rem; min-height: 120px; line-height: 1.2; margin-bottom: 45px; letter-spacing: -1px; }

        /* 结果页深度美化 */
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 35px 0; }
        .tag { padding: 4px 14px; border: 0.5px solid rgba(255,255,255,0.1); font-size: 0.6rem; border-radius: 2px; color: var(--accent); letter-spacing: 1px; }
        
        .quote-box { 
            margin: 40px 0; padding: 40px; background: rgba(255,255,255,0.015); 
            border-top: 0.5px solid rgba(255,255,255,0.1); border-bottom: 0.5px solid rgba(255,255,255,0.1);
            text-align: left; line-height: 1.8; font-size: 0.95rem; position: relative;
        }
        .quote-box::before { content: 'Note to self:'; display: block; font-size: 0.6rem; opacity: 0.3; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }

        .match-item { text-align: left; margin: 20px 0; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
        .match-bar-bg { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-top: 10px; }
        .match-bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 2.5s ease; }

        .album-era { font-size: 0.55rem; letter-spacing: 5px; opacity: 0.3; margin-bottom: 15px; text-transform: uppercase; }
    </style>
</head>

            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; b.onclick = () => { scores[o.s]++; next(); };
                optDiv.appendChild(b);
            });
        }

        function next() { cur++; if(cur < 30) show(); else finish(); }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const win = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const meta = {
                'A': { t: "I miss you, I'm sorry", d: "你是一封永远寄不出的旧情书，字迹在潮湿的记忆里慢慢晕开。你习惯在反刍遗憾中确认自己的存在，那种‘温柔的处刑’是你逃避现实的避难所。" },
                'B': { t: "Block Me Out", d: "你是一座在深夜里超负荷运转的工厂，噪音震耳欲聋，却无人听见。你渴望被屏蔽，渴望在那层厚厚的机械装甲下，重新找回心跳原本的节奏。" },
                'C': { t: "Risk", d: "你是那种明知道会被灼伤，却依然扑向火焰的飞蛾。你不需要理智的安慰，你只需要那一瞬间的电光石火，来证明你在这个死寂的世界里真实地活过。" },
                'D': { t: "Free Now", d: "你是在漫长极夜后终于看到的第一缕曙光。你剪断了那些曾让你窒息的红线，带着一种‘劫后余生’的轻盈，在荒原上跳起了一支孤独而自由的舞。" }
            };

            document.getElementById('res-title').innerText = meta[win].t;
            document.getElementById('res-desc').innerText = meta[win].d;
            
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            allKeywords.sort(() => 0.5 - Math.random()).slice(0, 10).forEach(t => {
                tagDiv.innerHTML += `<span class="tag">${t}</span>`;
            });

            document.getElementById('res-quote').innerText = quotes[win][Math.floor(Math.random() * quotes[win].length)];

            const sNames = ["Camden", "Rockland", "Right Now", "The Bottom", "Mess It Up"];
            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            sNames.forEach(s => {
                let val = Math.floor(Math.random() * 30) + 65;
                matchList.innerHTML += `<div class="match-item"><span>${s}</span><span style="float:right">${val}%</span><div class="match-bar-bg"><div class="match-bar-fill" style="width:${val}%"></div></div></div>`;
            });

            document.getElementById('result').style.display = 'block';
            setTimeout(() => { document.querySelectorAll('.match-bar-fill').forEach(b => b.style.width = b.parentElement.previousElementSibling.innerText); }, 100);
        }
    </script>
</body>
</html>
