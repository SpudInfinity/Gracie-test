<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracie Abrams: A Stream of Consciousness</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --text: #e0e0e0; --accent: #b4c4d5; --glass: rgba(255, 255, 255, 0.02); }
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); padding: 20px; }
        #app { width: 100%; max-width: 550px; padding: 50px 30px; background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); text-align: center; box-shadow: 0 50px 120px rgba(0,0,0,0.9); position: relative; overflow: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        .gracie-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; filter: grayscale(100%) contrast(1.1); margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; text-align: left; padding-left: 25px; letter-spacing: 1px; }
        .btn:hover { background: var(--text); color: #000; transform: translateY(-2px); }
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.03); margin-bottom: 30px; }
        #bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        #quiz, #result { display: none; }
        #q-text { font-size: 1.6rem; min-height: 100px; line-height: 1.2; margin-bottom: 40px; letter-spacing: -0.5px; }
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 25px 0; }
        .tag { padding: 5px 15px; border: 0.5px solid rgba(180, 196, 213, 0.4); font-size: 0.65rem; border-radius: 20px; color: var(--accent); background: rgba(255,255,255,0.02); }
        .quote { font-size: 0.9rem; opacity: 0.8; line-height: 1.8; margin: 20px 0; padding: 0 20px; border-left: 1px solid var(--accent); text-align: left; }
        .match-item { text-align: left; margin: 15px 0; font-size: 0.7rem; letter-spacing: 1px; opacity: 0.7; }
        .match-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin-top: 8px; }
        .match-bar-fill { height: 100%; background: var(--accent); width: 0; }
        .rec-list { text-align: left; background: rgba(255,255,255,0.01); padding: 25px; border-radius: 2px; margin-top: 35px; border: 1px solid rgba(255,255,255,0.03); }
        .rec-title { font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; opacity: 0.5; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="block-me-out.mp3" type="audio/mpeg"></audio>

    <div id="app">
        <div id="start">
            <img src="gracie.jpg" class="gracie-img" onerror="this.style.opacity='0'">
            <h1 class="serif" style="font-size: 3rem; font-weight: 300; margin: 0; letter-spacing: -1px;">Fragmented Selves</h1>
            <p style="letter-spacing: 6px; font-size: 0.6rem; opacity: 0.3; margin-bottom: 50px;">A GRACIE ABRAMS RESONANCE TEST</p>
            <button class="btn" style="text-align:center; padding-left:0;" onclick="begin()">DECODE THE SILENCE</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p id="q-num" style="font-size: 0.6rem; opacity: 0.3; letter-spacing: 3px; margin-bottom: 15px;"></p>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <img src="gracie.jpg" class="gracie-img" style="width: 70px; height: 70px;">
            <p style="font-size: 0.6rem; letter-spacing: 3px; opacity: 0.4;">CORE FREQUENCY</p>
            <h1 id="res-title" class="serif" style="font-size: 2.5rem; color: var(--accent); margin: 15px 0;"></h1>
            
            <div id="res-tags" class="tags"></div>
            
            <div id="res-quote" class="quote serif"></div>
            
            <p id="res-desc" class="serif" style="opacity: 0.6; line-height: 1.8; font-size: 0.95rem; text-align: left;"></p>

            <div id="match-scores" style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;">
                <div id="match-list"></div>
            </div>

            <div class="rec-list">
                <div class="rec-title serif">Indie Curation & Cinema Soundtracks</div>
                <div id="rec-songs" style="font-size: 0.8rem; line-height: 2.2; opacity: 0.7;"></div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top: 40px; width: auto; padding: 12px 50px; display: inline-block; text-align:center;">REGENERATE</button>
        </div>
    </div>

    <script>
        // 100个意识流关键词库
        const allKeywords = [
            "末日余晖", "过期雨季", "蓝莓之夜", "潮湿阁楼", "失语霓虹", "碎裂胶片", "凌晨四点", "深海呼吸", "枯萎信笺", "电子荒原",
            "无声告别", "坠落行星", "铁锈记忆", "薄雾晨曦", "孤岛心理", "旧磁带跳帧", "空镜美学", "触不到的恋人", "私人废墟", "潜意识漫游",
            "半梦半醒", "极简忧郁", "反刍遗憾", "黑白默片", "斯德哥尔摩之夏", "灵魂褶皱", "错位时空", "循环自毁", "致命温柔", "孤独观测者",
            "冷色调依恋", "瞬时永恒", "逃离地心", "玫瑰余烬", "北欧极夜", "无目的地漂流", "胶片颗粒感", "雨水收集器", "隔墙有耳", "沉没之城",
            "旧书店灰尘", "未完成的诗", "酒精与诗歌", "深夜公路电影", "迷失东京", "破碎银幕", "蓝色大门", "无人区玫瑰", "反向生长", "静默审判",
            "记忆标本", "失眠症候群", "灵魂副作用", "过度诠释", "虚构的亲密", "玻璃之城", "流动的盛宴", "昨日世界", "不确定的光", "灰烬审美",
            "野草生长", "感官仓库", "沉默的火山", "深渊的回响", "莫奈的花园", "荒诞戏剧", "局外人", "西西弗斯的石头", "慢动作心碎", "低保真情绪",
            "云端漫步", "枯竭的喷泉", "梦的解析", "时间简史", "宇宙尘埃", "微观依恋", "被禁忌的游戏", "永恒的女性", "夜色温柔", "悲观主义的花朵",
            "第七封印", "野草莓", "偷自行车的人", "四百击", "狂人皮埃罗", "尤利西斯", "荒原", "去往灯塔", "达洛维夫人", "波斯语课",
            "小城之春", "重庆森林", "春光乍泄", "花样年华", "东邪西毒", "恋恋风尘", "悲情城市", "恐怖分子", "牯岭街少年", "一一"
        ];

        // 电影/诗歌语录库
        const quotes = {
            'A': [
                "“每个人都会经过这个阶段，见到一座山，就想知道山后面是什么。” ——《东邪西毒》",
                "“如果我们不能再见面，那么祝你早安、午安、晚安。” ——《楚门的世界》",
                "“回忆是忧伤的，尽管有时它也是甜蜜的。” ——《昨日世界》",
                "“我爱你，我也爱那个曾经爱着你的我。” —— 席慕容"
            ],
            'B': [
                "“你以为躲起来就没事了吗？没有用的，像你这么出色的人，到哪里都像漆黑中的萤火虫一样。” ——《国产凌凌漆》",
                "“在这个世界上，只有一种真正的英雄主义，就是认清了生活的真相后依然热爱它。” —— 罗曼·罗兰",
                "“有时候我觉得自己像一个机器，不停地运转，却不知道为了什么。” ——《现代启示录》",
                "“在那之前，我以为我的人生是一出悲剧，现在我意识到，它是一出喜剧。” ——《小丑》"
            ],
            'C': [
                "“我知道我是一个危险的人，但我愿意为了那一刻的火花而燃烧。” ——《狂人皮埃罗》",
                "“生活并不复杂，复杂的是我们。” ——《欲望号街车》",
                "“你必须在有限的时间里，爱一个具体的人。” —— 罗翔",
                "“即使我知道明天世界就会崩塌，我今天依然要种下我的苹果树。” —— 路德"
            ],
            'D': [
                "“我终于学会了如何爱自己，在这个荒凉的世界里。” ——《一个人的朝圣》",
                "“自由不仅是做你想做的事，而是你可以不做你不想做的事。” —— 康德",
                "“过去不再有重量，它像雾一样散去了。” ——《海边的曼彻斯特》",
                "“当你不再拥有的时候，你唯一能做的，就是令自己不要忘记。” ——《东邪西毒》"
            ]
        };

        const questions = [
            { q: "深夜里，你是如何听见自己的？", options: [{t:"在旧录音带的杂音里", s:"A"}, {t:"在心跳频率的混乱中", s:"B"}, {t:"在另一个人的呼吸声旁", s:"C"}, {t:"在凌晨四点的寂静里", s:"D"}] },
            { q: "如果你是房间里亮着的那盏灯？", options: [{t:"正在微微闪烁，快要熄灭", s:"A"}, {t:"照亮了所有不该看的角落", s:"B"}, {t:"为了某人的到来而一直亮着", s:"C"}, {t:"我已经学会了自己关灯", s:"D"}] },
            { q: "道歉的碎片堆在地上，你觉得那是？", options: [{t:"必须要拼凑好的过去", s:"A"}, {t:"扎脚的玻璃，最好别碰", s:"B"}, {t:"一种渴望被爱的筹码", s:"C"}, {t:"可以打扫掉的尘埃", s:"D"}] },
            { q: "当你凝视镜中的自己时，你看到？", options: [{t:"一个十年前的遗憾", s:"A"}, {t:"一个满负荷运转的机器", s:"B"}, {t:"一个等待被点燃的火苗", s:"C"}, {t:"一个终于找回名字的陌生人", s:"D"}] },
            { q: "如果要把这一刻的心碎命名，你会叫它？", options: [{t:"昨日的延长线", s:"A"}, {t:"正在崩塌的围墙", s:"B"}, {t:"一场心甘情愿的冒险", s:"C"}, {t:"落幕后的余晖", s:"D"}] },
            { q: "你更习惯躲在哪里？", options: [{t:"潮湿的阁楼", s:"A"}, {t:"噪音巨大的耳机里", s:"B"}, {t:"对方大衣的阴影里", s:"C"}, {t:"空旷的公路尽头", s:"D"}] },
            { q: "如果你是一个季节？", options: [{t:"永恒的深秋", s:"A"}, {t:"暴雨前的闷热下午", s:"B"}, {t:"盛夏最刺眼的阳光", s:"C"}, {t:"初春刚融化的冰层", s:"D"}] },
            { q: "回忆像哪种声音？", options: [{t:"反转播放的磁带", s:"A"}, {t:"指甲划过黑板的长鸣", s:"B"}, {t:"远处传来的低音贝斯", s:"C"}, {t:"翻动旧纸张的沙沙声", s:"D"}] },
            { q: "你如何处理那些沉重的情绪？", options: [{t:"把它们写成没有收件人的信", s:"A"}, {t:"按下静音键，假装听不见", s:"B"}, {t:"把它们全部倾倒给某人", s:"C"}, {t:"让它们随着长路流走", s:"D"}] },
            { q: "如果你必须烧掉一样东西？", options: [{t:"唯一的一张旧照片", s:"A"}, {t:"昨晚发疯写的日记", s:"B"}, {t:"那个人的联系方式", s:"C"}, {t:"已经不合适的旧衣服", s:"D"}] },
            { q: "“爱”最直观的触感是？", options: [{t:"冰冷的金属拉链", s:"A"}, {t:"生锈的齿轮摩擦", s:"B"}, {t:"加速心跳带来的眩晕", s:"C"}, {t:"微风拂过皮肤的轻柔", s:"D"}] },
            { q: "当人群散去，你留在原地？", options: [{t:"寻找掉落的碎片", s:"A"}, {t:"数着呼吸缓解心悸", s:"B"}, {t:"期待那个人会回头", s:"C"}, {t:"转身走向反方向", s:"D"}] },
            { q: "如果你是一个秘密？", options: [{t:"写在已经泛黄的纸上", s:"A"}, {t:"藏在最深的保险柜里", s:"B"}, {t:"在每个深夜呼之欲出", s:"C"}, {t:"已经不再是秘密了", s:"D"}] },
            { q: "你的梦境通常是？", options: [{t:"黑白的默片", s:"A"}, {t:"失控的垂直坠落", s:"B"}, {t:"充满色彩的追逐战", s:"C"}, {t:"一片宁静的海面", s:"D"}] },
            { q: "关于那个“TA”，你现在的联想是？", options: [{t:"一把没有锁的钥匙", s:"A"}, {t:"一个无法停止的循环", s:"B"}, {t:"一颗正在坠落的恒星", s:"C"}, {t:"一张模糊的背景板", s:"D"}] },
            { q: "当你感到失控时，你会？", options: [{t:"不停地道歉", s:"A"}, {t:"把自己关在浴室里", s:"B"}, {t:"开车冲进黑夜里", s:"C"}, {t:"深呼吸，然后放手", s:"D"}] },
            { q: "如果你是一段旋律？", options: [{t:"略带跑调的钢琴", s:"A"}, {t:"急促的打击乐", s:"B"}, {t:"轻快的吉他弹唱", s:"C"}, {t:"悠长的大提琴", s:"D"}] },
            { q: "关于未来，你看到的是？", options: [{t:"灰色的雾气", s:"A"}, {t:"刺眼的白光", s:"B"}, {t:"变幻莫测的色彩", s:"C"}, {t:"地平线上的曙光", s:"D"}] },
            { q: "你的自愈过程像？", options: [{t:"在雨中漫步", s:"A"}, {t:"修补一架坏掉的机器", s:"B"}, {t:"在一场大火中重生", s:"C"}, {t:"慢慢剪短长发", s:"D"}] },
            { q: "必须要说最后一句话？", options: [{t:"“对不起，我还在这”", s:"A"}, {t:"“把我彻底屏蔽吧”", s:"B"}, {t:"“我愿意再冒一次险”", s:"C"}, {t:"“我已经自由了”", s:"D"}] },
            { q: "窗外路灯照进房间，你觉得是？", options: [{t:"某种审判的目光", s:"A"}, {t:"寒冷的白色干扰", s:"B"}, {t:"邀请你出门的暗示", s:"C"}, {t:"再平凡不过的夜晚", s:"D"}] },
            { q: "你习惯如何掩饰悲伤？", options: [{t:"在人群中不停说话", s:"A"}, {t:"戴上兜帽低下头", s:"B"}, {t:"大笑直到眼角湿润", s:"C"}, {t:"坦然承认我在心碎", s:"D"}] },
            { q: "带走回忆里的一样东西？", options: [{t:"那天微凉的空气", s:"A"}, {t:"那段争执的声音", s:"B"}, {t:"那种心动的战栗", s:"C"}, {t:"什么都不带走", s:"D"}] },
            { q: "关于“放手”，现在的感觉是？", options: [{t:"还没准备好，永远不", s:"A"}, {t:"正在练习闭上眼", s:"B"}, {t:"是一种必要的自毁", s:"C"}, {t:"是一场迟到的洗礼", s:"D"}] },
            { q: "你在关系中最像哪种角色？", options: [{t:"那个总是在等的人", s:"A"}, {t:"那个总是在逃的人", s:"B"}, {t:"那个总在追的人", s:"C"}, {t:"那个已经走远的人", s:"D"}] },
            { q: "深夜杂货店，你会买？", options: [{t:"过期很久的糖果", s:"A"}, {t:"一支不知道颜色的笔", s:"B"}, {t:"最烈的烈酒", s:"C"}, {t:"一瓶最纯净的水", s:"D"}] },
            { q: "如果你是一棵树，你？", options: [{t:"在深秋落光了叶子", s:"A"}, {t:"正在暴风雨中摇晃", s:"B"}, {t:"为了阳光拼命生长", s:"C"}, {t:"扎根在安静的山谷", s:"D"}] },
            { q: "回忆里的气味通常是？", options: [{t:"旧信件的味道", s:"A"}, {t:"汽油与灰尘的味道", s:"B"}, {t:"某种特定的香水味", s:"C"}, {t:"雨后泥土的味道", s:"D"}] },
            { q: "关于遗憾，最后想说？", options: [{t:"“我会一直留着它”", s:"A"}, {t:"“这让我窒息”", s:"B"}, {t:"“我很庆幸发生过”", s:"C"}, {t:"“已经翻篇了”", s:"D"}] },
            { q: "你爱自己吗？在这个瞬间。", options: [{t:"正在学着道歉", s:"A"}, {t:"很难，但我努力", s:"B"}, {t:"是的，很爱", s:"D"}, {t:"不知道答案", s:"C"}] }
        ];

        let cur = 0; let scores = { A:0, B:0, C:0, D:0 };

        function begin() {
            const m = document.getElementById('bgm'); m.volume = 0.4; m.play().catch(() => {});
            document.getElementById('start').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            show();
        }

        function show() {
            const q = questions[cur];
            document.getElementById('q-num').innerText = `FRAGMENT ${cur + 1} / 30`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('bar').style.width = ((cur+1)/30)*100 + '%';
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; b.onclick = () => { scores[o.s]++; next(); };
                optDiv.appendChild(b);
            });
        }

        function next() { cur++; if(cur < 30) show(); else finish(); }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const win = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const meta = {
                'A': { t: "I miss you, I'm sorry", d: "你是一封永远寄不出的旧情书，字迹在潮湿的记忆里慢慢晕开。你习惯在反刍遗憾中确认自己的存在，那种‘温柔的处刑’是你逃避现实的避难所。" },
                'B': { t: "Block Me Out", d: "你是一座在深夜里超负荷运转的工厂，噪音震耳欲聋，却无人听见。你渴望被屏蔽，渴望在那层厚厚的机械装甲下，重新找回心跳原本的节奏。" },
                'C': { t: "Risk", d: "你是那种明知道会被灼伤，却依然扑向火焰的飞蛾。你不需要理智的安慰，你只需要那一瞬间的电光石火，来证明你在这个死寂的世界里真实地活过。" },
                'D': { t: "Free Now", d: "你是在漫长极夜后终于看到的第一缕曙光。你剪断了那些曾让你窒息的红线，带着一种‘劫后余生’的轻盈，在荒原上跳起了一支孤独而自由的舞。" }
            };

            const result = meta[win];
            document.getElementById('res-title').innerText = result.t;
            document.getElementById('res-desc').innerText = result.d;
            
            // 随机抽取关键词
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            let shufTags = allKeywords.sort(() => 0.5 - Math.random()).slice(0, 8);
            shufTags.forEach(t => { tagDiv.innerHTML += `<span class="tag">${t}</span>`; });

            // 随机抽取语录
            const quoteDiv = document.getElementById('res-quote');
            let selQuote = quotes[win][Math.floor(Math.random() * quotes[win].length)];
            quoteDiv.innerText = selQuote;

            // 动态匹配度
            const sNames = ["Camden", "Rockland", "Right Now", "Full Machine", "Mess It Up"];
            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            sNames.forEach(s => {
                let val = Math.floor(Math.random() * 40) + 55;
                matchList.innerHTML += `<div class="match-item"><span>${s}</span><span style="float:right">${val}%</span><div class="match-bar-bg"><div class="match-bar-fill" style="width:${val}%"></div></div></div>`;
            });

            // 随机推荐5首歌 (保持跨歌手联动)
            const recs = ["Phoebe Bridgers - Moon Song", "Mitski - A Pearl", "Clairo - Bags", "Lana Del Rey - Venice Bitch", "Holly Humberstone - Scarlett", "Ethel Cain - Crush", "Boygenius - Stay Down", "Bon Iver - Holocene"];
            const recDiv = document.getElementById('rec-songs'); recDiv.innerHTML = '';
            recs.sort(() => 0.5 - Math.random()).slice(0, 5).forEach(s => { recDiv.innerHTML += `<div>· ${s}</div>`; });

            document.getElementById('result').style.display = 'block';
            setTimeout(() => { document.querySelectorAll('.match-bar-fill').forEach(b => b.style.width = b.parentElement.previousElementSibling.innerText); }, 100);
        }
    </script>
</body>
</html>
