<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fragments of Echoes | Gracie Abrams Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400;1,600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050607; --text: #a0a0a0; --accent: #8ba1b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-y: auto; padding: 40px 0; }
        #app { width: 90%; max-width: 460px; padding: 20px; text-align: center; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        
        .photo-frame { width: 115px; height: 115px; margin: 0 auto 30px; border-radius: 50%; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #111; position: relative;}
        .gracie-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); position: relative; z-index: 2; display: block;}
        
        .btn { display: block; width: 100%; padding: 22px; margin: 12px 0; background: none; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; color: var(--text); font-size: 0.65rem; text-align: left; padding-left: 20px; letter-spacing: 3px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); text-transform: uppercase; outline: none; }
        .btn:hover { background: #fff; color: #000; padding-left: 35px; }
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 50px; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.6s ease; }
        #quiz, #result { display: none; }
        #q-text { font-size: 1.4rem; min-height: 100px; line-height: 1.5; margin-bottom: 40px; color: #fff; font-weight: 300; letter-spacing: -0.5px; }
        
        .quote-box { margin: 35px 0; padding: 30px 25px; border-top: 0.5px solid rgba(255,255,255,0.08); border-bottom: 0.5px solid rgba(255,255,255,0.08); text-align: left; line-height: 2.1; font-size: 0.85rem; color: #e0e0e0; }
        .tag-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .tag { padding: 4px 10px; border: 0.5px solid rgba(255,255,255,0.12); font-size: 0.52rem; color: var(--accent); display: inline-block; letter-spacing: 1px; text-transform: uppercase; }
        .match-item { text-align: left; margin: 25px 0; }
        .match-info { display: flex; justify-content: space-between; font-size: 0.55rem; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .track-bg { height: 1px; background: rgba(255,255,255,0.04); overflow: hidden; }
        .track-fill { height: 100%; background: var(--accent); width: 0; transition: width 3s ease; }
        .label { font-size: 0.5rem; letter-spacing: 7px; opacity: 0.3; margin-bottom: 15px; text-transform: uppercase; display: block; }
    </style>
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="block-me-out.mp3" type="audio/mpeg">
    </audio>

    <div id="app">
        <div id="start">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img"></div>
            <h1 class="serif" style="font-size: 2.8rem; margin-bottom: 5px; color: #fff; letter-spacing: -1px;">The Fragments of Echoes</h1>
            <p class="label">Soul Archive v2.0</p>
            <p class="serif" style="font-size: 0.75rem; opacity: 0.6; line-height: 2.2; margin: 45px 0; letter-spacing: 0.5px;">
                "You do not have to be good.<br>
                You only have to let the soft animal of your body<br>
                love what it loves."
            </p>
            <button class="btn" style="text-align:center; padding-left:0;" onclick="begin()">Start Calculation</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p class="label" id="q-counter">Chapter 01</p>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img"></div>
            <p class="label">Primary Soul Frequency</p>
            <h1 id="res-title" class="serif" style="font-size: 2.2rem; margin: 10px 0; color: #fff; letter-spacing: -1px;"></h1>
            <div class="tag-container" id="res-tags"></div>
            <div class="quote-box serif" id="res-quote"></div>
            <p id="res-desc" class="serif" style="opacity: 0.6; line-height: 2.5; text-align: left; font-size: 0.88rem; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.06);"></p>
            
            <div style="margin-top: 60px; text-align: left;">
                <p class="label">Top 5 Correlation Tracks</p>
                <div id="match-list"></div>
            </div>

            <button class="btn" onclick="location.reload()" style="margin-top: 80px; width: auto; padding: 12px 55px; display: inline-block; text-align:center;">Reset Archive</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');

        const allKeywords = ["末日余晖", "过期雨季", "失语霓虹", "碎裂胶片", "凌晨四点", "深海呼吸", "枯萎信笺", "铁锈记忆", "薄雾晨曦", "孤岛心理", "旧磁带跳帧", "空镜美学", "私人废墟", "潜意识漫游", "半梦半醒", "极简忧郁", "反刍遗憾", "黑白默片", "灵魂褶皱", "错位时空", "循环自毁", "致命温柔", "孤独观测者", "冷色调依恋", "瞬时永恒", "逃离地心", "玫瑰余烬", "无人区玫瑰", "昨日世界", "灰烬审美", "无声尖叫", "灵魂寄宿", "幻肢痛", "单色世界", "雨水收集", "微凉体温", "心室颤动", "旧报纸", "倒放的人生", "破碎共识", "冷战美学", "灰度空间", "呼吸刻度", "情感幽灵", "数字葬礼", "霓虹废土", "寂静之声", "无名氏", "过期药水", "蓝调时刻", "无主之地", "玻璃弹珠", "生锈项链", "匿名悲伤", "潮湿书页", "真空包装", "零温心跳", "漂浮颗粒", "影子共生", "伪装平静"];

        // 歌曲库：保留 The Blue，移除 Blue (已移除)
        const library = [
            { title: "I miss you, I'm sorry", q: "有些事，只有通过遗憾才能完整。", d: "你是昨日废墟的拾荒者，在每一个告别中寻找尚未冷却的温存，即便明知那是幻觉，你也甘愿沉溺其中不愿醒来。", v: [10, 3, 5, 1] },
            { title: "The Blue", q: "那是深不见底的颜色，是我爱你的代价。", d: "你沉溺于某种深邃的情感，拒绝浮出水面接触世俗的干燥，蓝色不仅是忧郁，更是你灵魂深处唯一的安全感。", v: [9, 6, 4, 1] },
            { title: "That's So True", q: "承认阴暗的嫉妒，是坦诚的开始。", d: "你拥有极强的共感力，也深受情绪反噬之苦，那些看似病态的执念，实则是你灵魂深处最真实的悸动与不安。", v: [2, 4, 10, 2] },
            { title: "Free Now", q: "剪断那些无形的线，重力才有了意义。", d: "你完成了最艰难的断舍离，在废墟之上重建了自我，现在的你是一片学会飞翔的落叶，轻盈、自由且无所依附。", v: [1, 1, 2, 10] },
            { title: "Block Me Out", q: "我擅长制造噪音，直到听不见心跳。", d: "你是一座精密运转的孤岛，用理性的噪音掩盖情绪的过载，在彻底崩塌前，你习惯于先将世界屏蔽在感知之外。", v: [3, 10, 4, 1] },
            { title: "Risk", q: "哪怕只有瞬时火花，也足以照亮荒芜。", d: "你是天生的冒险家，迷恋坠落前的眩晕感，拒绝平庸的安稳，即便知道代价是碎裂，你也愿意为那一刻的炽热买单。", v: [1, 2, 10, 4] },
            { title: "Where Do We Go Now?", q: "我也许未达目的地，但我已离开原点。", d: "你穿透了曾经窒息的浓雾，这种轻盈源于你终于不再回头看，而是将目光投向了前方未知但开阔的荒野。", v: [2, 3, 1, 10] },
            { title: "21", q: "我想象着你在不同时空里的样子。", d: "你的爱带着一种抽离的观察感，你擅长在记忆里构建平行的完美时空，用来安置现实中无法承载的情感，在幻想中求生。", v: [8, 4, 3, 2] },
            { title: "Close To You", q: "有些距离，是靠燃烧执念缩短的。", d: "你对纯粹的渴望近乎偏执，渴望在某种极致的靠近中融化自我，这种痴狂是你对抗世界虚无的唯一方式，既壮烈又孤独。", v: [2, 2, 10, 1] },
            { title: "I Love You, I'm Sorry", q: "爱与愧疚，往往是同一枚硬币的两面。", d: "你在破坏与重建中反复，总是比别人更早预感终点，那些看似矛盾的告白，实则是你灵魂深处的妥协与挣扎。", v: [9, 3, 7, 2] },
            { title: "Rockland", q: "在这里，孤独是一种可以被触摸的质感。", d: "你擅长在冷色调的世界里安放自己，孤独不仅是你的盔甲，更是你审美中最私密、最高级的部分，无需他人打扰。", v: [4, 10, 2, 2] },
            { title: "Camden", q: "有些痛感，是为了证明我还活着。", d: "你有着超乎常人的耐受力，在自愈的循环中不断强化灵魂，那些未曾彻底愈合的伤口，是你作为幸存者独特的生命印记。", v: [3, 9, 4, 3] },
            { title: "Full Machine", q: "我像零件过剩的机器，在爱里频繁卡顿。", d: "你过度思考每一个细节，试图用理性拆解情感，直到这种精密让你感到疲惫，才发现自己已深陷在情绪的泥潭之中。", v: [2, 10, 5, 1] },
            { title: "Mess It Up", q: "搞砸一切，是我本能的自救方式。", d: "你在失控中寻找平衡，用暂时的混乱换取长久的自由，即便满身泥泞，你也拒绝在虚假的安稳里慢慢窒息。", v: [4, 2, 10, 5] },
            { title: "Right Now", q: "这一刻的静默，比所有承诺都真实。", d: "你学会了与当下握手言和，不再盲目向往远方，就在此地平静呼吸，这种沉淀是你灵魂历经风暴后得到的珍贵馈赠。", v: [1, 5, 1, 10] },
            { title: "Amelie", q: "你是我幻想出来的光，还是真实的存在？", d: "你习惯于在精神世界里塑造理想的镜像，现实总是让你感到隔阂，你更爱那个活在记忆滤镜里、永不褪色的虚影。", v: [4, 10, 2, 1] },
            { title: "Difficult", q: "承认现状很难，但假装快乐更累。", d: "你是个拒绝平庸伪装的诚实者，即便尴尬也胜过虚虚，你坚信只有直面那些混乱的真相，才能获得真正意义上的平静。", v: [2, 9, 3, 6] },
            { title: "us.(feat.Taylor Swift)", q: "我们是彼此影子的重叠。", d: "你寻找的是灵魂的镜像，渴望在另一个人身上看见遗失的自己，这种深度的连接让你感到既恐惧又深深着迷。", v: [6, 4, 8, 2] },
            { title: "Best", q: "我给过你最好的，虽然那也毁了我们。", d: "你的给予总是倾尽所有，那种重量既是勋章也是枷锁，你习惯在自我燃烧中确认爱的纯度，哪怕最终只剩灰烬。", v: [10, 3, 6, 1] },
            { title: "Tough Love", q: "如果是为了你，我可以忍受所有的刺。", d: "你的温柔里带着锋芒，你的爱是带有宗教感的奉献，你享受那种在痛苦中逐渐升华的纯粹感，那是你活着的证据。", v: [2, 1, 10, 5] },
            { title: "Blowing Smoke", q: "那些烟雾，遮住了你离开的背影。", d: "你擅长用幻觉构建防御网，在看似洒脱的表象下，你正竭力克制着灵魂深处快要灭顶的悲伤，不让它轻易流露。", v: [5, 8, 4, 2] },
            { title: "Faultline", q: "在断层带跳舞，是我唯一的节奏。", d: "你习惯了危险的边缘感，只有不确定的未来才能让你感到兴奋，你是昨日遗憾的继承者，也是明日冒险的偏执先锋。", v: [4, 2, 10, 3] },
            { title: "I should hate you", q: "恨是爱的残骸，我却将其视作宝藏。", d: "你无法彻底清空记忆，只能在矛盾的旋涡里保持站立，恨意是你对抗遗忘最后的武器，也是你留给自己的退路。", v: [9, 3, 5, 2] },
            { title: "Alright", q: "我会好起来的，哪怕是在废墟里。", d: "你拥有一种韧性的乐观，在极度的悲伤中也能捕捉到微光，你坚信碎裂之后，必将迎来某种更加完整的重生。", v: [1, 4, 2, 10] },
            { title: "Older", q: "长大是学会了对遗憾保持沉默。", d: "你比同龄人更早地理解了妥协与放弃，那种成熟里带着淡淡的灰调，是你灵魂在时光磨砺下生成的独特保护色。", v: [5, 8, 2, 7] },
            { title: "Wishful Thinking", q: "幻想是你留给我最后的礼物。", d: "你活在无数个“如果”之中，擅长在平行的宇宙里修正过去，这种虚妄的温存是你对抗现实冰冷唯一的解药。", v: [10, 4, 3, 1] },
            { title: "Augusta", q: "换个地方生活，就能换个灵魂吗？", d: "你渴望逃离现状，但灵魂的负重让你无论走到哪里都无法真正轻盈，你正在学习如何在此地，在此时安放自己。", v: [2, 9, 2, 5] },
            { title: "Better", q: "更好不代表不再痛，只是学会了忍受。", d: "你的人生哲学是不断地向下扎根，即便土壤已经枯竭，你也依然挺拔，那种冷清的高贵是你灵魂最深刻的注脚。", v: [1, 4, 2, 10] },
            { title: "The Bottom", q: "到底部了，剩下的只有上升。", d: "你已经经历过最深沉的黑暗，现在的你拥有无所畏惧的力量，任何形式的微光都能支撑你重新启程，迈向未知。", v: [1, 6, 2, 10] },
            { title: "Brush Fire", q: "野火烧过的地方，会有新的草木。", d: "你的人生历经毁灭性的洗礼，你习惯在余烬中寻找新生的种子，你的生命力总能在被焚毁的废墟上再次破土而出。", v: [3, 2, 10, 7] },
            { title: "405", q: "在高速公路上飞驰，试图甩掉记忆。", d: "你试图通过速度与喧嚣换取暂时的平静，但有些回响总是紧跟其后，在每一个深夜里将你重新拉回遗憾的现场。", v: [4, 3, 10, 2] },
            { title: "Two People", q: "我们成了最熟悉的陌生人。", d: "你感叹于时间的残忍与情感的易逝，但你也在这种不可逆的疏离中找到了某种体面，那是对曾经自己的一种慈悲。", v: [9, 7, 2, 3] },
            { title: "Unsteady", q: "在摇晃的世界里，寻找一个支点。", d: "你正处于人生的剧烈过渡期，混乱与迷茫是常态，你正试图在不断坠落的感触中，重新建立起内心的稳定秩序。", v: [2, 4, 10, 4] },
            { title: "Good Luck Charlie", q: "祝你好运，在那段没有我的旅程里。", d: "你学会了最高级的爱——在最后的体面与诚挚祝福中彻底放手，这种轻盈是对彼此曾经拥有过最好的交代。", v: [1, 2, 2, 10] },
            { title: "Normal Thing", q: "想要平凡，却偏偏生而敏感。", d: "你总想融入人群，但你独特的灵魂注定让你显得耀眼而孤单，敏感是你洞察世界的触角，也是你孤独的源头。", v: [2, 10, 5, 3] },
            { title: "Cool", q: "假装酷，是我保护自己的最后一层壳。", d: "你外表冷峻，实则内心滚烫，这种剧烈的反差是你最迷人的地方，你的“酷”是你抵御外界伤害最后的防御。", v: [1, 9, 6, 2] },
            { title: "I Told You Things", q: "我给过你进入我禁地的钥匙。", d: "你对信任有着近乎洁癖的要求，一旦感知到受损便会永久闭关，这首歌记录了你曾经不设防时最柔软的坦诚。", v: [10, 6, 3, 1] },
            { title: "tehe", q: "苦笑也是笑，哪怕带着泪。", d: "你擅长用幽默消解痛苦，在荒诞的世界里寻找生存的逻辑，你是自己生活里的悲剧导演，也是唯一的喜剧演员。", v: [2, 3, 10, 4] },
            { title: "Friend", q: "最危险的距离，就是所谓的朋友。", d: "你在界限感中反复挣扎，渴望跨越却又害怕彻底失去，这种谨慎的温柔是你灵魂深处最柔软也最脆弱的部分。", v: [9, 5, 6, 2] },
            { title: "Stay", q: "留下来，哪怕只是一场幻觉。", d: "你对温存有着极致的渴求，即便明知对方已是无法触及的幻影，你也愿意用燃烧自我的方式挽留那一瞬间的温度。", v: [10, 4, 5, 1] },
            { title: "Unlearn", q: "学会爱之前，要先学着忘记你。", d: "你正进行一场艰难的灵魂重构，在这个过程中，你需要剥离那些因他人而生的执念，重新找回属于自己的原点。", v: [4, 3, 3, 10] },
            { title: "Cedar", q: "像雪松一样，在严寒中静默生长。", d: "你拥有一种冷清的高贵气质，即便无人欣赏也依然选择挺拔，孤独是你灵魂深处不可亵渎、神圣的一部分。", v: [2, 10, 2, 6] },
            { title: "Under / Over", q: "在过载与缺失之间，我反复横跳。", d: "你追求极致的情绪体验，你的世界里没有中间地带，只有剧烈的碰撞与彻底的静止，这让你显得深刻而危险。", v: [2, 5, 10, 3] },
            { title: "Felt Good About You", q: "曾经的美好是真的，现在的清醒也是。", d: "你是一个敢于彻底推翻过去的人，清醒不仅是你的防御，更是你重新掌控人生的武器，哪怕伴随着阵痛。", v: [4, 3, 4, 10] },
            { title: "Long Sleeves", q: "有些遮掩，是为了不让伤口被看见。", d: "你的克制让你显得神秘且遥不可及，你的脆弱只在深夜里对自己开放，那些不为人知的痕迹，是你灵魂的指纹。", v: [10, 7, 3, 1] },
            { title: "Packing It Up", q: "终于，我不再需要这些沉重的行李。", d: "在这个告别的季节，你终于学会了卸下沉重的过去，这种重获新生的轻盈感是你给自我最有价值的终极礼物。", v: [1, 2, 5, 10] },
            { title: "minor", q: "小调的人生，也有独特的旋律。", d: "你习惯于非主流的选择，在不被关注的角落里自给自足，这种冷僻的幽默感是你对抗平庸世俗最有力的武器。", v: [3, 10, 2, 5] },
            { title: "Painkillers", q: "止痛药只能止痛，不能治愈伤口。", d: "你依赖于某种暂时的慰藉来确认存在的证据，逃避现实的锋利，却总是忘了去寻找真正导致灵魂流血的原因。", v: [3, 4, 10, 2] },
            { title: "For Real This Time", q: "这次是真的，我不再回头了。", d: "你的决绝是一场迟到的灵魂洗礼，是对昨日所有遗憾的一次彻底清算，你正坚定地走在自我重塑的单行道上。", v: [1, 2, 3, 10] },
            { title: "In Between", q: "在离开与留下的缝隙里，我屏住呼吸。", d: "你正处于剧烈的过渡期，每一个细微的选择都显得异常沉重，你正学着在这个不稳定的状态下寻找属于自己的平衡。", v: [6, 5, 10, 2] },
            { title: "Blowing Smoke", q: "烟雾消散后，我终于看见了荒芜。", d: "你擅长在幻觉中寻找瞬间的安全感，直到现实残忍地强制让你清醒，那种瞬间的崩塌感是你生命中独特的风景。", v: [5, 8, 4, 3] }
        ];

            { q: "如果你是一个季节？", options: [{t:"永恒的深秋", s:"A"}, {t:"暴雨前的闷热下午", s:"B"}, {t:"盛夏刺眼的阳光", s:"C"}, {t:"初春刚融化的冰", s:"D"}] },
            { q: "回忆像哪种声音？", options: [{t:"反奏的磁带", s:"A"}, {t:"指甲划过黑板", s:"B"}, {t:"远处模糊的鼓点", s:"C"}, {t:"翻动纸张的沙沙声", s:"D"}] },
            { q: "你如何处理沉重的情绪？", options: [{t:"写成没收件人的信", s:"A"}, {t:"按下静音键", s:"B"}, {t:"全部倾倒给某人", s:"C"}, {t:"让它们随长路流走", s:"D"}] },
            { q: "必须要烧掉一样东西？", options: [{t:"唯一的旧照片", s:"A"}, {t:"发疯写的日记", s:"B"}, {t:"那个人的联系方式", s:"C"}, {t:"不再合适的衣服", s:"D"}] },
            { q: "“爱”最直观的触感？", options: [{t:"冰冷的金属拉链", s:"A"}, {t:"生锈的齿轮摩擦", s:"B"}, {t:"眩晕的心跳", s:"C"}, {t:"微风拂过皮肤", s:"D"}] },
            { q: "当人群散去，你留在原地？", options: [{t:"寻找碎片", s:"A"}, {t:"缓解心悸", s:"B"}, {t:"期待那个人回头", s:"C"}, {t:"走向反方向", s:"D"}] },
            { q: "如果你是一个秘密？", options: [{t:"泛黄纸上", s:"A"}, {t:"在保险柜里", s:"B"}, {t:"深夜呼之欲出", s:"C"}, {t:"不再是秘密", s:"D"}] },
            { q: "关于TA现在的联想？", options: [{t:"没有锁的钥匙", s:"A"}, {t:"无法停止的循环", s:"B"}, {t:"坠落的恒星", s:"C"}, {t:"模糊的背景板", s:"D"}] },
            { q: "必须要说最后一句话？", options: [{t:"对不起我还在这里", s:"A"}, {t:"请把我彻底屏蔽", s:"B"}, {t:"我愿意再冒次险", s:"C"}, {t:"我已经自由了", s:"D"}] },
            { q: "窗外路灯照进房间？", options: [{t:"审判的目光", s:"A"}, {t:"寒冷的干扰", s:"B"}, {t:"出门的暗示", s:"C"}, {t:"平凡的夜晚", s:"D"}] },
            { q: "如何掩饰悲伤？", options: [{t:"不停说话", s:"A"}, {t:"沉默不语", s:"B"}, {t:"大笑直到流泪", s:"C"}, {t:"坦然承认", s:"D"}] },
            { q: "如果你是一段旋律？", options: [{t:"跑调的钢琴", s:"A"}, {t:"急促的打击乐", s:"B"}, {t:"轻快扫弦", s:"C"}, {t:"悠长提琴", s:"D"}] },
            { q: "自愈的过程更像？", options: [{t:"雨中漫步", s:"A"}, {t:"修理机器", s:"B"}, {t:"大火中重生", s:"C"}, {t:"剪短长发", s:"D"}] },
            { q: "如果你是房间的颜色？", options: [{t:"过期的米白色", s:"A"}, {t:"压抑的深蓝色", s:"B"}, {t:"刺眼的鲜红色", s:"C"}, {t:"宁静的琥珀色", s:"D"}] },
            { q: "最让你安全的空间？", options: [{t:"被窝里", s:"A"}, {t:"影院最后一排", s:"B"}, {t:"行驶的车内", s:"C"}, {t:"空旷的公路", s:"D"}] },
            { q: "把自己制作成标本？", options: [{t:"泛黄匿名信", s:"A"}, {t:"窒息的白花", s:"B"}, {t:"未灭的火种", s:"C"}, {t:"流动的落叶", s:"D"}] },
            { q: "整个世界都在下沉？", options: [{t:"抓紧谁的手", s:"A"}, {t:"蜷缩身体", s:"B"}, {t:"加速下坠", s:"C"}, {t:"在水底呼吸", s:"D"}] },
            { q: "你爱现在的自己吗？", options: [{t:"正在学道歉", s:"A"}, {t:"很难但努力中", s:"B"}, {t:"是的很爱", s:"D"}, {t:"没有答案", s:"C"}] },
            { q: "回忆里的气味通常是？", options: [{t:"旧信件的味道", s:"A"}, {t:"汽油与灰尘", s:"B"}, {t:"特定的香水味", s:"C"}, {t:"雨后的泥土", s:"D"}] },
            { q: "必须要带走的一样东西？", options: [{t:"微凉的空气", s:"A"}, {t:"那段争执的声音", s:"B"}, {t:"那种心动的战栗", s:"C"}, {t:"什么都不带走", s:"D"}] },
            { q: "放手感觉更像？", options: [{t:"还没准备好", s:"A"}, {t:"练习闭上眼", s:"B"}, {t:"必要的自毁", s:"C"}, {t:"迟到的洗礼", s:"D"}] },
            { q: "深夜杂货店，你会买？", options: [{t:"过期糖果", s:"A"}, {t:"一支笔", s:"B"}, {t:"最烈的酒", s:"C"}, {t:"一瓶纯净水", s:"D"}] },
            { q: "如果明天世界末日？", options: [{t:"沉溺回忆", s:"A"}, {t:"躲进地下室", s:"B"}, {t:"疯狂寻找那个人", s:"C"}, {t:"看最后的日落", s:"D"}] },
            { q: "走过这段回响的心境？", options: [{t:"依旧沉重", s:"A"}, {t:"充满噪音", s:"B"}, {t:"跃跃欲试", s:"C"}, {t:"一片宁静", s:"D"}] }
        ];

        let cur = 0; let userVector = [0, 0, 0, 0];

        function begin() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            audio.play().catch(e => console.log("Audio play deferred"));
            show();
        }

        function show() {
            if(cur >= 30) { finish(); return; }
            const q = questions[cur];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-counter').innerText = `CHAPTER ${String(cur+1).padStart(2, '0')}`;
            document.getElementById('bar').style.width = ((cur+1)/30)*100 + '%';
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; 
                b.onclick = () => { 
                    if (audio.paused) audio.play().catch(()=>{});
                    userVector["ABCD".indexOf(o.s)] += 4; cur++; show(); 
                };
                optDiv.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const sorted = library.map(song => {
                let dist = 0;
                for(let i=0; i<4; i++) dist += Math.pow(userVector[i] - (song.v[i] * 2.5), 2);
                return { ...song, dist: Math.sqrt(dist) };
            }).sort((a, b) => a.dist - b.dist);

            const result = sorted[0];
            document.getElementById('res-title').innerText = result.title;
            document.getElementById('res-quote').innerText = `“${result.q}”`;
            document.getElementById('res-desc').innerText = result.d;
            
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            const shuffledTags = [...allKeywords].sort(() => 0.5 - Math.random());
            shuffledTags.slice(0, 6).forEach(t => { 
                tagDiv.innerHTML += `<span class="tag">${t}</span>`; 
            });

            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            sorted.slice(1, 6).forEach((s, idx) => {
                let matchVal = Math.floor(98 - (s.dist / 1.5) - (idx * 2));
                if(matchVal < 60) matchVal = 60 + Math.floor(Math.random()*15);
                matchList.innerHTML += `
                    <div class="match-item">
                        <div class="match-info"><span>${s.title}</span><span>${matchVal}% Resonance</span></div>
                        <div class="track-bg"><div class="track-fill" style="width:${matchVal}%"></div></div>
                    </div>`;
            });

            document.getElementById('result').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
