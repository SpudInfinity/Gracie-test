<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracie Abrams | The Complete Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --text: #e0e0e0; --accent: #9eb1c7; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; transition: all 0.4s ease; }
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        #app {
            width: 90%; max-width: 500px; padding: 40px 25px;
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08); text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        .gracie-img {
            width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
            filter: grayscale(100%); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            display: block; width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
        }
        .btn:hover { background: var(--text); color: #000; transform: scale(1.02); }
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 25px; }
        #bar { width: 0%; height: 100%; background: var(--accent); }
        #quiz, #result { display: none; }
        #q-text { font-size: 1.4rem; min-height: 70px; line-height: 1.3; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="block-me-out.mp3" type="audio/mpeg"></audio>

    <div id="app">
        <div id="start">
            <img src="gracie.jpg" class="gracie-img" onerror="this.style.opacity='0'">
            <h1 class="serif" style="font-size: 2.2rem; font-weight: 300; margin: 0;">The Echo Chamber.</h1>
            <p style="letter-spacing: 3px; font-size: 0.6rem; opacity: 0.4; margin-bottom: 30px;">FIND YOUR GRACIE ANTHEM</p>
            <button class="btn" onclick="begin()">START REFLECTION</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <img src="gracie.jpg" class="gracie-img" style="width: 70px; height: 70px;">
            <p style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.5;">YOUR DESTINY SONG</p>
            <h1 id="res-title" class="serif" style="font-size: 2rem; color: var(--accent); margin: 10px 0;"></h1>
            <p id="res-desc" class="serif" style="opacity: 0.7; line-height: 1.6; font-size: 1rem; padding: 0 10px;"></p>
            <button class="btn" onclick="location.reload()" style="margin-top: 30px; width: auto; padding: 10px 30px; display: inline-block;">RETRY</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "深夜你无法入睡的原因通常是？", options: [
                {t:"脑海中反复回放一段对话", s:"A"}, {t:"对未来的不确定感到焦虑", s:"B"}, 
                {t:"沉溺在对某个人的想念中", s:"C"}, {t:"纯粹享受孤独的清醒", s:"D"}
            ]},
            { q: "如果要把这一刻的心情写下来，你会？", options: [
                {t:"写一封永远不会寄出的信", s:"A"}, {t:"在备忘录里打下杂乱的字句", s:"B"}, 
                {t:"画一个只有自己懂的符号", s:"C"}, {t:"撕碎手边的一张纸", s:"D"}
            ]},
            { q: "关于爱，你现在的状态更接近？", options: [
                {t:"卑微地渴望被注意到", s:"A"}, {t:"冷静地想要逃离这一切", s:"B"}, 
                {t:"在回忆里反复拉扯自己", s:"C"}, {t:"已经学会了和自己相处", s:"D"}
            ]},
            { q: "你最喜欢的环境是？", options: [
                {t:"下雨时的窗边", s:"A"}, {t:"疾驰的车内后座", s:"B"}, 
                {t:"光线昏暗的卧室", s:"C"}, {t:"清晨无人的街道", s:"D"}
            ]},
            { q: "如果一段关系结束了，你会？", options: [
                {t:"不停地道歉，试图挽回", s:"A"}, {t:"屏蔽对方所有的动态", s:"B"}, 
                {t:"留着所有的合照不删", s:"C"}, {t:"写一首歌送给对方", s:"D"}
            ]}
        ];

        let cur = 0;
        let scores = { A:0, B:0, C:0, D:0 };

        function begin() {
            const m = document.getElementById('bgm'); m.volume = 0.4; m.play().catch(() => {});
            document.getElementById('start').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            show();
        }

        function show() {
            const q = questions[cur];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('bar').style.width = ((cur+1)/questions.length)*100 + '%';
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = o.t;
                b.onclick = () => { scores[o.s]++; next(); };
                optDiv.appendChild(b);
            });
        }

        function next() {
            cur++;
            if(cur < questions.length) show();
            else finish();
        }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const results = {
                'A': { t: "I miss you, I'm sorry", d: "你是感性的、诚实的。你宁愿沉溺在道歉中，也不愿面对真正的失去。" },
                'B': { t: "Block Me Out", d: "你是一个复杂的矛盾体。你试图屏蔽世界，却在安静中听到了最响亮的焦虑。" },
                'C': { t: "Risk / Close to You", d: "你充满了生命力。哪怕知道有风险，你也愿意为了那一瞬间的靠近而倾尽所有。" },
                'D': { t: "Good Riddance / Free Now", d: "你已经准备好放手了。在这个测试的尽头，你找到了属于自己的自由。" }
            };

            document.getElementById('res-title').innerText = results[winner].t;
            document.getElementById('res-desc').innerText = results[winner].d;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
