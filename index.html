<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fragments of Echoes</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400;1,600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050607; --text: #a0a0a0; --accent: #8ba1b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-y: auto; padding: 40px 0; }
        #app { width: 90%; max-width: 440px; padding: 20px; text-align: center; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }
        .photo-frame { width: 115px; height: 115px; margin: 0 auto 30px; border-radius: 50%; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .gracie-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); }
        
        /* Poetic Buttons */
        .btn { display: block; width: 100%; padding: 22px; margin: 12px 0; background: none; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; color: var(--text); font-size: 0.65rem; text-align: left; padding-left: 20px; letter-spacing: 3px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); text-transform: uppercase; }
        .btn:hover { background: #fff; color: #000; padding-left: 35px; }
        
        .progress { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 50px; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.6s ease; }
        
        #quiz, #result { display: none; }
        #q-text { font-size: 1.4rem; min-height: 100px; line-height: 1.5; margin-bottom: 40px; color: #fff; font-weight: 300; letter-spacing: -0.5px; }
        
        .quote-box { margin: 35px 0; padding: 30px 25px; border-top: 0.5px solid rgba(255,255,255,0.08); border-bottom: 0.5px solid rgba(255,255,255,0.08); text-align: left; line-height: 2.1; font-size: 0.85rem; color: #e0e0e0; position: relative; }
        .tag { padding: 4px 10px; border: 0.5px solid rgba(255,255,255,0.12); font-size: 0.55rem; color: var(--accent); margin: 3px; display: inline-block; letter-spacing: 1px; }
        
        /* Resonance Sections */
        .match-item { text-align: left; margin: 25px 0; }
        .match-info { display: flex; justify-content: space-between; font-size: 0.55rem; opacity: 0.4; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .track-bg { height: 1px; background: rgba(255,255,255,0.04); overflow: hidden; }
        .track-fill { height: 100%; background: var(--accent); width: 0; transition: width 3s ease; }
        
        .label { font-size: 0.5rem; letter-spacing: 7px; opacity: 0.3; margin-bottom: 15px; text-transform: uppercase; display: block; }
        .rec-card { background: rgba(255,255,255,0.015); padding: 20px; margin-bottom: 12px; text-align: left; border: 0.5px solid rgba(255,255,255,0.05); }
        .rec-artist { font-size: 0.5rem; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .rec-title { font-size: 0.9rem; color: #fff; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; }
    </style>
</head>
<body>
    <div id="app">
        <div id="start">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img" alt="Gracie"></div>
            <h1 class="serif" style="font-size: 2.8rem; margin-bottom: 5px; color: #fff; letter-spacing: -1px;">The Fragments of Echoes</h1>
            <p class="label">A Psychometric Archive</p>
            <p style="font-size: 0.7rem; opacity: 0.5; line-height: 2.8; margin: 45px 0; letter-spacing: 1.2px; font-weight: 300;">
                "Every song you loved was a blueprint<br>
                of the heart you once broke.<br>
                Step into the silence, and listen to the ghosts."
            </p>
            <button class="btn" style="text-align:center; padding-left:0;" onclick="begin()">Enter the Void</button>
        </div>

        <div id="quiz">
            <div class="progress"><div id="bar"></div></div>
            <p class="label" id="q-counter">Chapter 01</p>
            <p id="q-text" class="serif"></p>
            <div id="options"></div>
        </div>

        <div id="result">
            <div class="photo-frame"><img src="gracie.jpg" class="gracie-img" alt="Gracie"></div>
            <p class="label">Resonance Result</p>
            <h1 id="res-title" class="serif" style="font-size: 2.4rem; margin: 10px 0; color: #fff; letter-spacing: -1px;"></h1>
            <div id="res-tags"></div>
            
            <div class="quote-box serif" id="res-quote"></div>
            <p id="res-desc" class="serif" style="opacity: 0.6; line-height: 2.5; text-align: left; font-size: 0.88rem; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.06);"></p>
            
            <div style="margin-top: 60px; text-align: left;">
                <p class="label">I. Gracie Correlation</p>
                <div id="match-list"></div>
            </div>

            <div style="margin-top: 60px; text-align: left;">
                <p class="label">II. Extended Resonance</p>
                <div id="extended-list"></div>
            </div>
            
            <button class="btn" onclick="location.reload()" style="margin-top: 80px; width: auto; padding: 12px 55px; display: inline-block; text-align:center; font-size:0.6rem;">Dissolve the Memory</button>
        </div>
    </div>

    <script>
        // 词库配置
        const allKeywords = ["末日余晖", "过期雨季", "失语霓虹", "碎裂胶片", "凌晨四点", "深海呼吸", "枯萎信笺", "坠落行星", "铁锈记忆", "薄雾晨曦", "孤岛心理", "空镜美学", "灵魂褶皱", "致命温柔", "孤独观测者", "瞬时永恒", "逃离地心", "玫瑰余烬", "无人区玫瑰", "静默审判", "记忆标本", "失眠症候群", "灵魂副作用", "昨日世界", "灰烬审美", "深渊的回响", "莫奈的花园", "西西弗斯的石头", "慢动作心碎", "低保真情绪", "云端漫步", "宇宙尘埃", "微观依恋", "夜色温柔", "悲观主义的花朵", "尤利西斯", "去往灯塔", "重庆森林", "春光乍泄", "花样年华", "恋恋风尘"];

        const gracieSongs = ["21", "I miss you, I'm sorry", "Long Sleeves", "minor", "Stay", "Block me out", "Full Machine", "Hard to sleep", "Faultline", "Camden", "The Exit", "Right Now", "Amelie", "Risk", "Close To You", "Blowing Smoke", "Let It Happen", "Tough Love", "I Love You, I'm Sorry", "Free Now", "Good Riddance", "The Secret of Us", "Feels Like", "Rockland", "Blue", "Augusta", "405", "Happy for You"];

        const extendedLibrary = [
            { a: "Phoebe Bridgers", t: "Moon Song" }, { a: "Phoebe Bridgers", t: "Garden Song" }, { a: "Phoebe Bridgers", t: "Smoke Signals" },
            { a: "Taylor Swift", t: "Mirrorball" }, { a: "Taylor Swift", t: "Champagne Problems" }, { a: "Taylor Swift", t: "This Is Me Trying" },
            { a: "Lizzie McAlpine", t: "Ceilings" }, { a: "Lizzie McAlpine", t: "Doomsday" },
            { a: "Bon Iver", t: "Holocene" }, { a: "Sufjan Stevens", t: "Fourth of July" },
            { a: "Lorde", t: "Liability" }, { a: "Clairo", t: "Bags" }, { a: "Mitski", t: "First Love / Late Spring" },
            { a: "Boygenius", t: "Emily I'm Sorry" }, { a: "The Japanese House", t: "Saw You In A Dream" }
        ];

        const types = {
            'A': { title: "I miss you, I'm sorry", quote: "“有些事，只有通过遗憾才能被完整地记起。” —— 安哲罗普洛斯", desc: "你习惯在废墟中翻找尚未冷却的温存。对你来说，告别不是结束，而是漫长的、带有颗粒感的余震。你在这首歌里听到的，是你从未寄出的信。" },
            'B': { title: "Block Me Out", quote: "“我太擅长在自己的脑海里制造噪音，直到听不见心跳声。” —— Gracie Abrams", desc: "你是一座在深夜独自运行的精密机器，所有的过载都被掩盖在平静下。你渴望那种极致的‘屏蔽’，因为你明白，真正的自由往往始于彻底的断裂。" },
            'C': { title: "Risk", quote: "“哪怕只有一瞬间的火花，也足以照亮整段荒芜的青春。” —— 《蓝莓之夜》", desc: "你拥有一种近乎悲剧性的勇敢。明知前方是悬崖，你依然迷恋坠落前的眩晕感。你不需要避风港，你只需要那一次剧烈的燃烧。" },
            'D': { title: "Free Now", quote: "“我也许没能到达目的地，但我确实离开了原点。” —— 辛波斯卡", desc: "你穿透了浓雾。那些曾经让你彻夜难眠的细节，现在已经变成了风中的尘埃。现在的轻盈，是付出了沉重代价后的奖赏。" }
        };

        const questions = [
            { q: "深夜里，你是如何听见自己的？", options: [{t:"在旧录音带的杂音里", s:"A"}, {t:"在心跳频率的混乱中", s:"B"}, {t:"在另一个人的呼吸声旁", s:"C"}, {t:"在凌晨四点的寂静里", s:"D"}] },
            { q: "如果你是房间里亮着的那盏灯？", options: [{t:"闪烁着快要熄灭", s:"A"}, {t:"照亮了不该看的角落", s:"B"}, {t:"为了某人一直亮着", s:"C"}, {t:"学会了自己关灯", s:"D"}] },
            { q: "道歉的碎片堆在地上，那是？", options: [{t:"必须拼凑好的过去", s:"A"}, {t:"扎脚的玻璃，别碰", s:"B"}, {t:"渴望被爱的筹码", s:"C"}, {t:"可以打扫掉的尘埃", s:"D"}] },
            { q: "回忆像哪种声音？", options: [{t:"反向播放的磁带", s:"A"}, {t:"重负荷的机组长鸣", s:"B"}, {t:"远处模糊的鼓点", s:"C"}, {t:"翻动纸张的沙沙声", s:"D"}] },
            { q: "必须要说最后一句话？", options: [{t:"“对不起，我还在这”", s:"A"}, {t:"“把我彻底屏蔽吧”", s:"B"}, {t:"“我愿意再冒一次险”", s:"C"}, {t:"“我已经自由了”", s:"D"}] }
        ];

        let cur = 0; let scores = { A:0, B:0, C:0, D:0 };
        function begin() { document.getElementById('start').style.display = 'none'; document.getElementById('quiz').style.display = 'block'; show(); }
        
        function show() {
            if(cur >= 12) { finish(); return; } 
            const q = questions[cur % questions.length];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-counter').innerText = `CHAPTER ${String(cur+1).padStart(2, '0')}`;
            document.getElementById('bar').style.width = ((cur+1)/12)*100 + '%';
            const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn';
                b.innerText = o.t; b.onclick = () => { scores[o.s]++; cur++; show(); };
                optDiv.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('quiz').style.display = 'none';
            const win = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const data = types[win];
            document.getElementById('res-title').innerText = data.title;
            document.getElementById('res-quote').innerText = data.quote;
            document.getElementById('res-desc').innerText = data.desc;
            
            // 关键词抽取
            const tagDiv = document.getElementById('res-tags'); tagDiv.innerHTML = '';
            allKeywords.sort(() => 0.5 - Math.random()).slice(0, 6).forEach(t => { tagDiv.innerHTML += `<span class="tag">${t}</span>`; });

            // Gracie Plate
            const matchList = document.getElementById('match-list'); matchList.innerHTML = '';
            gracieSongs.filter(s => s !== data.title).sort(() => 0.5 - Math.random()).slice(0, 4).forEach((s, idx) => {
                let val = 97 - (idx * 5) - Math.floor(Math.random() * 4);
                matchList.innerHTML += `<div class="match-item"><div class="match-info"><span>${s}</span><span>${val}% Resonance</span></div><div class="track-bg"><div class="track-fill" style="width:${val}%"></div></div></div>`;
            });

            // Extended Plate
            const extList = document.getElementById('extended-list'); extList.innerHTML = '';
            extendedLibrary.sort(() => 0.5 - Math.random()).slice(0, 4).forEach(item => {
                extList.innerHTML += `<div class="rec-card"><div class="rec-artist">${item.a}</div><div class="rec-title">${item.t}</div></div>`;
            });

            document.getElementById('result').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
